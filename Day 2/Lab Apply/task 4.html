<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            width: 25%;
            height: 25%;
            border: 2px, solid, red;
        }
        #rabbit{
            position: absolute;
            width: 200px;
            height: 200px;
            bottom: 50px;
            right: 50px;
            border: 5px, solid, black;
        }
    </style>
    <script src="libs/jquery-4.0.0.min.js"></script>
    <script src="libs/jquery-ui-1.14.1.custom/jquery-ui.js"></script>
</head>
<body>
    <div>
        <img src="Task\3.JPG"  id="hole">
    </div>
    <img src="Task\2.jpg" id="rabbit">
    <script>
        $(document).ready(function()
        {
            $('#rabbit').draggable();
            $('#rabbit').click(function()
            {
                $('#rabbit').effect({effect:'shake', duration:500});
            });
            $('#hole').droppable({
                drop: function(event, ui)
                {
                    ui.draggable.hide(3000);
                }
            })
        })
    </script>
</body>
</html>
